<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D6BFE"/>
      <stop offset="100%" stop-color="#7aa2f7"/>
    </linearGradient>
  </defs>
  
  <!-- Outer subtle ring (DeepSeek style framing) -->
  <circle cx="20" cy="20" r="17" stroke="url(#grad)" stroke-width="1.2" fill="none" opacity="0.25"/>
  
  <!-- Central swirling neural core (Claude-inspired organic curves) -->
  <path d="M20 6 
           C28 6, 34 12, 34 20 
           C34 28, 28 34, 20 34 
           C12 34, 6 28, 6 20 
           C6 14, 10 9, 16 8" 
        fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
        
  <!-- Inner swirling arc -->
  <path d="M16 8 
           C20 7, 24 8, 26 12 
           C28 16, 28 22, 24 26 
           C20 30, 14 30, 10 26" 
        fill="none" stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
        
  <!-- Central node -->
  <circle cx="20" cy="18" r="2.5" fill="url(#grad)"/>
  
  <!-- Orbiting accent dots (Claude's scattered nodes) -->
  <circle cx="34" cy="20" r="1.8" fill="url(#grad)" opacity="0.6"/>
  <circle cx="6" cy="20" r="1.8" fill="url(#grad)" opacity="0.6"/>
  <circle cx="20" cy="34" r="1.8" fill="url(#grad)" opacity="0.6"/>
  <circle cx="20" cy="6" r="1.8" fill="url(#grad)" opacity="0.6"/>
  
  <!-- Small connecting arcs between nodes -->
  <path d="M20 6 C22 8, 28 10, 34 20" fill="none" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M34 20 C28 30, 22 32, 20 34" fill="none" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M20 34 C18 32, 12 30, 6 20" fill="none" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M6 20 C12 10, 18 8, 20 6" fill="none" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
